services:
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - agent-gateway

  agent-gateway:
    build: ./agent-gateway
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./discord-bridge/data:/discord-bridge/data
    environment:
      - LOCALE=en
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - OTTR_API_KEY=${OTTR_API_KEY:-}
      - GATEWAY_ALLOWED_ORIGINS=${GATEWAY_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-60}
      - PORTFOLIO_STATE_PATH=/discord-bridge/data/portfolio_state.json
      - JOURNAL_FILE=/discord-bridge/data/trade_journal.json

  discord-bridge:
    build: ./discord-bridge
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - AGENT_GATEWAY_URL=http://agent-gateway:8000
      - CEO_DISCORD_ID=${CEO_DISCORD_ID:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - OTTR_API_KEY=${OTTR_API_KEY:-}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-30}
      - CEO_MIN_INTERVAL_SEC=${CEO_MIN_INTERVAL_SEC:-2}
