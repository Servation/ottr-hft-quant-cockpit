services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - agent-gateway

  agent-gateway:
    build: ./agent-gateway
    ports:
      - "8000:8000"
    environment:
      - MARKET_ENGINE_URL=http://market-engine:8080
      - LOCALE=en
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
    depends_on:
      - market-engine

  market-engine:
    build: ./market-engine
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ottr}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
