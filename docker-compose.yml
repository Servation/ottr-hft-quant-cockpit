services:
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - agent-gateway

  agent-gateway:
    build: ./agent-gateway
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./discord-bridge/data:/discord-bridge/data
    environment:
      - LOCALE=en
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}

  discord-bridge:
    build: ./discord-bridge
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - AGENT_GATEWAY_URL=http://agent-gateway:8000
      - CEO_DISCORD_ID=${CEO_DISCORD_ID:-}
