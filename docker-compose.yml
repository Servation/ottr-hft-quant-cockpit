services:
  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time so the dashboard can send
        # X-API-Key on writes. (Client-side value by nature — keep the app on localhost.)
        VITE_OTTR_API_KEY: ${OTTR_API_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - agent-gateway

  agent-gateway:
    build: ./agent-gateway
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Shares the bridge's authoritative state dir (read-only view of portfolio/journal).
      - ./discord-bridge/data:/discord-bridge/data
    environment:
      - LOCALE=${LOCALE:-en}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - OTTR_API_KEY=${OTTR_API_KEY:-}
      - GATEWAY_ALLOWED_ORIGINS=${GATEWAY_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-60}
      - PORTFOLIO_STATE_PATH=/discord-bridge/data/portfolio_state.json
      - JOURNAL_FILE=/discord-bridge/data/trade_journal.json

  discord-bridge:
    build: ./discord-bridge
    # Lets the bridge reach an LLM (LM Studio) running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # SAME host dir the gateway mounts -> single source of truth + persists across restarts.
      - ./discord-bridge/data:/app/data
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_TRADING_FLOOR_CHANNEL_ID=${DISCORD_TRADING_FLOOR_CHANNEL_ID:-}
      - DISCORD_SYSTEM_STATUS_CHANNEL_ID=${DISCORD_SYSTEM_STATUS_CHANNEL_ID:-}
      - DISCORD_AUDIT_LOGS_CHANNEL_ID=${DISCORD_AUDIT_LOGS_CHANNEL_ID:-}
      - AGENT_GATEWAY_URL=http://agent-gateway:8000
      - CEO_DISCORD_ID=${CEO_DISCORD_ID:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-}
      # Shared secret (must match the gateway) for the authenticated /api/directive.
      - OTTR_API_KEY=${OTTR_API_KEY:-}
      # Safety / throttling
      - API_RATE_LIMIT=${API_RATE_LIMIT:-30}
      - CEO_MIN_INTERVAL_SEC=${CEO_MIN_INTERVAL_SEC:-2}
      - TRADING_DRY_RUN=${TRADING_DRY_RUN:-0}
      - MAX_TRADE_USD=${MAX_TRADE_USD:-0}
