global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "agent-gateway"
    static_configs:
      - targets: ["agent-gateway:8000"]
    metrics_path: /metrics

  - job_name: "market-engine"
    static_configs:
      - targets: ["market-engine:8080"]
    metrics_path: /actuator/prometheus
